# v1.0 - Auto merge dictionary using Python - 2026-05-12
name: Sync Core Dictionary

on:
  push:
    paths:
      - 'data/new_words.csv' # Chỉ kích hoạt khi file CSV này có thay đổi

jobs:
  merge-dict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Python Merge Script
        run: python scripts/merge_dict.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/core_dict.json
          git add data/new_words.csv
          git commit -m "Auto-merge new words into core dictionary" || echo "No changes to commit"
          git push
